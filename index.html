<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent:       #2db866;
    --accent-light: #3fd97a;
    --accent-dim:   #0f2a1a;
    --accent-mid:   #1a4d2e;
    --gold:         #f5c842;
    --bg:           #080c09;
    --bg2:          #0d1210;
    --card:         #111714;
    --border:       #1e2b22;
    --muted:        #5a7060;
    --text:         #e8f0ea;
    --cal-month-color: #2db866;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; overflow-x: hidden; }
  .court-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03; background-image: linear-gradient(90deg, var(--accent) 1px, transparent 1px), linear-gradient(0deg, var(--accent) 1px, transparent 1px); background-size: 48px 48px; }
  .hero { position: relative; z-index: 1; min-height: 92vh; display: flex; flex-direction: column; justify-content: center; padding: 6rem 2rem 4rem; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 800px; height: 600px; background: radial-gradient(ellipse at 50% 30%, rgba(45,184,102,0.18) 0%, transparent 65%); pointer-events: none; }
  .hero-inner { max-width: 860px; margin: 0 auto; width: 100%; }
  .hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 12px; }
  .hero-eyebrow::before { content: ''; display: inline-block; width: 32px; height: 1px; background: var(--accent); }
  .hero h1 { font-family: var(--font-display); font-size: clamp(4.5rem, 14vw, 10rem); line-height: 0.88; letter-spacing: 2px; color: #fff; margin-bottom: 0.6rem; }
  .hero h1 .accent { color: var(--accent-light); }
  .hero-edition { font-family: var(--font-display); font-size: clamp(1.4rem, 4vw, 2.4rem); letter-spacing: 6px; color: var(--muted); margin-bottom: 2rem; }
  .hero-tagline { font-size: 15px; color: var(--muted); max-width: 480px; line-height: 1.7; margin-bottom: 3rem; }
  .hero-stats { display: flex; gap: 2.5rem; flex-wrap: wrap; margin-bottom: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
  .hstat-n { font-family: var(--font-display); font-size: 3rem; letter-spacing: 2px; color: var(--accent-light); line-height: 1; }
  .hstat-l { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .hero-social { display: flex; gap: 10px; }
  .btn-social { display: inline-flex; align-items: center; gap: 7px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 9px 18px; border-radius: 3px; text-decoration: none; transition: all 0.2s; }
  .btn-social:hover { border-color: var(--accent); color: var(--accent-light); }
  .hero-ball { position: absolute; right: -80px; top: 50%; transform: translateY(-60%); font-size: 28rem; opacity: 0.03; pointer-events: none; user-select: none; line-height: 1; }
  nav { position: sticky; top: 0; z-index: 200; background: rgba(8,12,9,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; padding: 0 2rem; }
  .nav-links { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .nav-links::-webkit-scrollbar { display: none; }
  .nav-links a { text-decoration: none; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; padding: 18px 16px; border-bottom: 2px solid transparent; white-space: nowrap; transition: opacity 0.2s; }
  .nav-links a.s1 { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-links a.s2 { color: var(--accent-light); border-bottom-color: var(--accent-light); }
  .nav-links a:hover { opacity: 0.7; }
  .section { position: relative; z-index: 1; padding: 5rem 2rem; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .sec-head { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .sec-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .sec-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: 2px; color: #fff; line-height: 1; }
  .sec-sub { font-size: 13px; color: var(--muted); margin-top: 0.5rem; }
  .section:nth-child(even) { background: var(--bg2); }
  .cal-filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 2rem; align-items: center; }
  .filter-group { display: flex; gap: 6px; align-items: center; }
  .filter-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .fpill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--border); color: var(--muted); background: transparent; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .fpill:hover { border-color: var(--accent-mid); color: var(--text); }
  .fpill.active { border-color: var(--accent); color: var(--accent-light); background: var(--accent-dim); }
  .fsearch { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 6px 14px; border-radius: 99px; outline: none; transition: border-color 0.2s; width: 200px; }
  .fsearch::placeholder { color: var(--muted); }
  .fsearch:focus { border-color: var(--accent); }
  .cal-empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 13px; letter-spacing: 1px; }
  .cal-section-bar { display: flex; align-items: center; gap: 12px; margin: 1.8rem 0 1rem; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }
  .cal-section-bar::before, .cal-section-bar::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cal-section-bar.passati  { color: var(--muted); }
  .cal-section-bar.prossimo { color: var(--accent); }
  .cal-section-bar.futuri   { color: var(--muted); }
  .btn-toggle-passati { display: flex; align-items: center; gap: 8px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 7px 18px; border-radius: 3px; cursor: pointer; transition: all 0.2s; margin-bottom: 1rem; }
  .btn-toggle-passati:hover { border-color: var(--muted); color: var(--text); }
  .btn-toggle-passati .arrow { transition: transform 0.25s; display: inline-block; }
  .btn-toggle-passati.open .arrow { transform: rotate(180deg); }
  #cal-passati-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  #cal-passati-wrapper.open { max-height: 9999px; }
  .day-block.prossimo > .day-header { border-bottom-color: var(--accent); }
  .day-block.prossimo .day-date-box { border-color: var(--accent); background: var(--accent-dim); }
  .day-block.prossimo .day-num  { color: var(--accent-light); }
  .day-block.prossimo .day-month { color: var(--accent-light); }
  .prossimo-badge { display: inline-block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); background: var(--accent-dim); border: 1px solid var(--accent-mid); border-radius: 3px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
  .day-block.passato { opacity: 0.55; }
  .btn-cal-action { display: block; margin: 2rem auto 0; background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 10px 28px; border-radius: 3px; cursor: pointer; transition: all 0.2s; }
  .btn-cal-action:hover { border-color: var(--accent); color: var(--accent-light); }
  .day-block { margin-bottom: 2.5rem; }
  .day-header { display: flex; align-items: center; gap: 14px; padding-bottom: 12px; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
  .day-date-box { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; display: flex; flex-direction: column; align-items: center; min-width: 58px; flex-shrink: 0; }
  .day-num   { font-family: var(--font-display); font-size: 2rem; line-height: 1; color: #fff; }
  .day-month { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--cal-month-color); margin-top: 1px; }
  .day-weekday { font-size: 12px; letter-spacing: 1px; color: var(--muted); font-weight: 500; text-transform: uppercase; }
  .girone-group { margin-bottom: 8px; }
  .girone-group-header { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 4px 4px 0 0; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .match-row { display: grid; grid-template-columns: 120px 1fr; align-items: center; background: var(--card); padding: 9px 14px; border: 1px solid var(--border); border-top: none; }
  .match-row:last-child { border-radius: 0 0 4px 4px; }
  .campo-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 500; letter-spacing: 1px; border-radius: 99px; padding: 3px 10px; white-space: nowrap; }
  .campo-r { background: rgba(232,64,138,0.1); color: #f06faa; border: 1px solid #4d1a32; }
  .campo-b { background: rgba(111,144,232,0.1); color: #6fb0e8; border: 1px solid #1a2868; }
  .campo-g { background: rgba(45,184,102,0.1); color: var(--accent-light); border: 1px solid var(--accent-mid); }
  .campo-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .teams-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 14px; }
  .team-name { font-size: 13px; font-weight: 500; color: #fff; flex: 1; }
  .team-name.right { text-align: right; }
  .vs-chip { font-size: 11px; color: var(--muted); background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; padding: 2px 8px; flex-shrink: 0; }
  .score-chip { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 2px; color: var(--accent-light); background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; padding: 2px 10px; flex-shrink: 0; cursor: pointer; transition: all 0.18s; }
  .score-chip:hover { border-color: var(--accent); background: var(--accent-dim); }
  .loading-msg { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .loading-dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* ── BRACKET FASE FINALE ── */
  #bracket-container { margin-bottom: 3rem; }
  .bracket-block { margin-bottom: 2.4rem; }
  .bracket-block:last-child { margin-bottom: 0; }
  .bracket-title { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 3px; color: #fff; margin-bottom: 0.3rem; }
  .bracket-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
  .bracket-sub.minor { color: var(--muted); margin-bottom: 0.8rem; }
  .bracket-grid { display: grid; grid-template-columns: 1fr 90px 1fr; align-items: center; gap: 0; position: relative; }
  .bracket-col-sf { display: flex; flex-direction: column; gap: 28px; }
  .bracket-card { background: var(--card); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
  .bracket-card-head { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid var(--border); }
  .bracket-time { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .bracket-teams { padding: 8px 12px; }
  .bracket-team { font-family: var(--font-display); font-size: 1rem; letter-spacing: 1.5px; color: #fff; padding: 4px 0; }
  .bracket-team.tbd { color: var(--muted); font-family: var(--font-body); font-size: 12px; letter-spacing: 0; font-style: italic; }
  .bracket-vs { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 1px 0; }
  .bracket-center { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; position: relative; min-height: 80px; }
  .bracket-connector { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  .bracket-final-card { background: var(--card); border: 1px solid var(--accent-mid); border-radius: 5px; overflow: hidden; cursor: default; }
  .bracket-final-card.clickable { cursor: pointer; transition: border-color 0.18s; }
  .bracket-final-card.clickable:hover { border-color: var(--accent); }
  .bracket-final-head { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--accent-dim); }
  .bracket-final-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-light); font-weight: 500; }
  .bracket-final-teams { padding: 8px 12px; }
  .bracket-final-placeholder { font-size: 11px; color: var(--muted); letter-spacing: 1px; font-style: italic; display: block; padding: 4px 0; }
  .bracket-final-result { font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 2px; color: var(--accent-light); text-align: center; padding: 4px 0; }
  @media (max-width: 640px) {
    .bracket-grid { grid-template-columns: 1fr; gap: 14px; }
    .bracket-center { min-height: 40px; }
    .bracket-connector { display: none; }
  }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 540px; transform: translateY(12px); transition: transform 0.2s; overflow: hidden; }
  .modal-overlay.open .modal-box { transform: none; }
  .modal-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .modal-girone-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 8px; }
  .modal-girone-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .modal-close { background: transparent; border: none; color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 2px 6px; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-teams { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; gap: 12px; background: var(--bg2); border-bottom: 2px solid var(--border); }
  .modal-team { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 2px; color: #fff; flex: 1; }
  .modal-team.right { text-align: right; }
  .modal-final-score { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 4px; color: var(--accent-light); background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 4px 14px; flex-shrink: 0; white-space: nowrap; }
  .modal-matches { padding: 6px 0; }
  .modal-match-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; padding: 10px 20px; border-bottom: 1px solid rgba(30,43,34,0.5); }
  .modal-match-row:last-child { border-bottom: none; }
  .modal-match-num { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .modal-match-players { color: var(--text); font-size: 12px; line-height: 1.5; }
  .modal-match-players .sep { color: var(--muted); margin: 0 6px; }
  .modal-match-result { font-family: var(--font-display); font-size: 1rem; letter-spacing: 2px; color: var(--accent-light); white-space: nowrap; flex-shrink: 0; }
  .modal-match-result.empty { color: var(--muted); font-family: var(--font-body); font-size: 11px; letter-spacing: 1px; }
  .modal-date-bar { padding: 10px 20px; font-size: 11px; letter-spacing: 1px; color: var(--muted); border-top: 1px solid var(--border); display: flex; gap: 18px; }

  /* ── CLASSIFICHE ── */
  .gironi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  @media(max-width: 900px) { .gironi-grid { grid-template-columns: 1fr 1fr; } }
  @media(max-width: 560px) { .gironi-grid { grid-template-columns: 1fr; } }
  .girone-card { background: var(--card); border-radius: 4px; overflow: hidden; }
  .girone-head { padding: 16px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid; }
  .girone-head-symbol { width: 36px; height: 36px; flex-shrink: 0; }
  .girone-label { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 3px; }
  .girone-sub { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .cl-table { width: 100%; border-collapse: collapse; }
  .cl-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .cl-table th.c { text-align: center; }
  .cl-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid rgba(30,43,34,0.4); }
  .cl-table td.c { text-align: center; color: var(--muted); font-size: 12px; }
  .cl-table tr:last-child td { border-bottom: none; }
  .cl-table tr:hover td { background: rgba(255,255,255,0.02); }
  .pos-num { font-family: var(--font-display); font-size: 1.1rem; color: var(--muted); }
  .pos-num.gold { color: var(--gold); }
  .sq-nm { font-weight: 500; color: #fff; }
  .pts-t { font-family: var(--font-display); font-size: 1.1rem; }
  .legenda { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 2rem; align-items: center; }
  .legenda-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
  .lev-badge { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 3px; letter-spacing: 1px; }
  .lev-white  { color: #111; background: #e8e8e8; }
  .lev-yellow { color: #111; background: #f5c842; }
  .lev-green  { color: #111; background: #4fd988; }
  .lev-orange { color: #fff; background: #e8802a; }
  .lev-red    { color: #fff; background: #d94f4f; }
  .squadre-search { margin-bottom: 2rem; }
  .squadre-search input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 10px 16px; border-radius: 3px; width: 100%; max-width: 360px; outline: none; transition: border-color 0.2s; }
  .squadre-search input::placeholder { color: var(--muted); }
  .squadre-search input:focus { border-color: var(--accent); }
  .squadre-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .squadra-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .squadra-card.hidden { display: none; }
  .squadra-head { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .squadra-head h3 { font-family: var(--font-display); font-size: 1.05rem; letter-spacing: 2px; }
  .squadra-badge { font-size: 10px; padding: 3px 9px; border-radius: 2px; flex-shrink: 0; margin-left: 8px; }
  .squadra-cap { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cap-icon { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); background: rgba(245,200,66,0.1); padding: 2px 7px; border-radius: 2px; flex-shrink: 0; }
  .cap-name { color: var(--text); font-weight: 500; }
  .squadra-players { padding: 4px 0; max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .squadra-players.open { max-height: 1200px; }
  .player-row { display: flex; align-items: center; gap: 10px; padding: 7px 16px; border-bottom: 1px solid rgba(30,43,34,0.5); font-size: 12px; }
  .player-row:last-child { border-bottom: none; }
  .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .player-name { flex: 1; color: #fff; }
  .squadra-toggle { font-size: 11px; color: var(--muted); letter-spacing: 1px; padding: 7px 16px; cursor: pointer; text-align: center; border-top: 1px solid var(--border); transition: color 0.2s; }
  .squadra-toggle:hover { color: var(--accent-light); }
  .storia-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
  .storia-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.4rem 1.2rem; text-align: center; transition: border-color 0.2s; }
  .storia-card:hover { border-color: var(--accent-mid); }
  .storia-card.current { border-color: var(--accent); background: var(--accent-dim); }
  .storia-ed { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .storia-trophy { font-size: 1.8rem; margin-bottom: 8px; }
  .storia-winner { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 2px; color: var(--gold); }
  .storia-card.current .storia-winner { color: var(--accent-light); }

function serialToDateStr(n) {
  const d = new Date(1899, 11, 30);
  d.setDate(d.getDate() + Math.floor(n));
  return d.getDate() + '/' + (d.getMonth() + 1) + '/' + String(d.getFullYear()).slice(2);
}

function parseData(raw) {
  if (!raw) return null;
  const p = raw.split('/');
  if (p.length < 2) return null;
  const d = parseInt(p[0]), m = parseInt(p[1]) - 1;
  if (isNaN(d) || isNaN(m) || m < 0 || m > 11) return null;
  const y = p[2] ? (parseInt(p[2]) < 100 ? 2000 + parseInt(p[2]) : parseInt(p[2])) : 2026;
  const date = new Date(y, m, d);
  return { day: d, month: MESI[m], weekday: GIORNI_W[date.getDay()],
    uniqueKey: y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0') };
}

function gironataShort(gStr) {
  if (!gStr) return '';
  const idx = CONFIG.giornate.labels.findIndex(l => l.toLowerCase() === gStr.toLowerCase());
  return idx >= 0 ? (CONFIG.giornate.roman[idx] + ' Giornata') : gStr;
}

function keyToDate(key) {
  if (key === '__nodate__') return new Date(9999, 0, 1);
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

async function fetchSheet(sheetName) {
  const fields = 'sheets.data.rowData.values(userEnteredValue,formattedValue,userEnteredFormat.backgroundColor)';
  const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.spreadsheetId
    + '?ranges=' + encodeURIComponent(sheetName)
    + '&fields=' + encodeURIComponent(fields)
    + '&key=' + CONFIG.apiKey;
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status + ' \u00b7 ' + sheetName);
  const json = await res.json();
  return json.sheets[0].data[0].rowData || [];
}

function parseGirone(rows) {
  const partite = [];
  let giornata = '';
  const val = (cells, i) => {
    const c = cells[i]; if (!c) return '';
    const fmt = (c.formattedValue || '').trim();
    const v = c.userEnteredValue;
    if (!v) return fmt;
    if (v.numberValue !== undefined && v.stringValue === undefined) return serialToDateStr(v.numberValue);
    return (v.stringValue != null ? v.stringValue : (v.numberValue != null ? v.numberValue.toString() : '')).trim() || fmt;
  };
  const numVal = (cells, i) => {
    const c = cells[i]; if (!c) return '';
    const v = c.userEnteredValue;
    if (!v) return (c.formattedValue || '').trim();
    if (v.numberValue !== undefined) return String(Math.round(v.numberValue));
    return (v.stringValue || '').trim();
  };
  const strVal = (cells, i) => {
    const c = cells[i]; if (!c) return '';
    const v = c.userEnteredValue;
    if (!v) return (c.formattedValue || '').trim();
    return (v.stringValue || c.formattedValue || '').trim();
  };
  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].values || [];
    const a = val(cells, 0); if (!a) continue;
    if (/giornata/i.test(a)) { giornata = a; continue; }
    if (/^data$/i.test(val(cells, 2))) continue;
    const sq2 = val(cells, 1); if (!sq2) continue;
    partite.push({
      giornata, sq1: a, sq2,
      data:   val(cells, 2),
      campo:  val(cells, 3).toUpperCase(),
      orario: strVal(cells, 4),
      risultato: strVal(cells, 6),
      p1: numVal(cells, 7),
      p2: numVal(cells, 8),
    });
  }
  const map = {};
  const ensure = n => { if (!map[n]) map[n] = { nome:n, pt:0, g:0, v:0, p:0, par:0 }; };
  partite.forEach(p => {
    ensure(p.sq1); ensure(p.sq2);
    if (p.p1 !== '' && p.p2 !== '') {
      const s1 = parseInt(p.p1)||0, s2 = parseInt(p.p2)||0;
      let pt1 = 0, pt2 = 0;
      if (s1 === 2 && s2 === 0)      { pt1 = 3; pt2 = 0; }
      else if (s1 === 0 && s2 === 2) { pt1 = 0; pt2 = 3; }
      else if (s1 === 2 && s2 === 1) { pt1 = 2; pt2 = 1; }
      else if (s1 === 1 && s2 === 2) { pt1 = 1; pt2 = 2; }
      map[p.sq1].pt += pt1; map[p.sq2].pt += pt2;
      map[p.sq1].g++;       map[p.sq2].g++;
      if (s1 > s2)      { map[p.sq1].v++; map[p.sq2].p++; }
      else if (s2 > s1) { map[p.sq2].v++; map[p.sq1].p++; }
      else                { map[p.sq1].par++; map[p.sq2].par++; }
    }
  });
  return { partite, squadre: Object.values(map).sort((a,b) => b.pt - a.pt || b.v - a.v) };
}

// ── BRACKET FASE FINALE (foglio "Tab") ───────────────────────────────────────
let bracketData = null;

function parseRangeLabel(raw) {
  const m = String(raw || '').trim().match(/^(\d+)\s*-\s*(\d+)$/);
  return m ? { a: parseInt(m[1]), b: parseInt(m[2]) } : null;
}

function parseTab(rows) {
  const val = (cells, i) => {
    const c = cells[i]; if (!c) return '';
    const fmt = (c.formattedValue || '').trim();
    const v = c.userEnteredValue;
    if (!v) return fmt;
    if (v.numberValue !== undefined && v.stringValue === undefined) return serialToDateStr(v.numberValue);
    return (v.stringValue != null ? v.stringValue : (v.numberValue != null ? v.numberValue.toString() : '')).trim() || fmt;
  };
  // Colonna A ("1-4", "5-8", ...): Google Sheets la interpreta spesso come data,
  // quindi usiamo sempre il formattedValue grezzo invece di convertirla.
  const rangeRaw = (cells, i) => {
    const c = cells[i]; if (!c) return '';
    return (c.formattedValue || '').trim();
  };
  const righe = [];
  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].values || [];
    const range = parseRangeLabel(rangeRaw(cells, 0));
    if (!range) continue;
    righe.push({
      range,
      sq1:    val(cells, 1),
      sq2:    val(cells, 2),
      data:   val(cells, 3),
      campo:  val(cells, 4).toUpperCase(),
      orario: val(cells, 5),
    });
  }
  // Raggruppa per "gruppo" in base al range della semifinale superiore (es. 1-4, 5-8)
  const gruppi = new Map();
  let gruppoCorrente = null;
  righe.forEach(row => {
    const isSemi = row.range.b - row.range.a >= 2;
    if (isSemi) {
      gruppoCorrente = row.range.a + '-' + row.range.b;
      if (!gruppi.has(gruppoCorrente)) gruppi.set(gruppoCorrente, { label: row.range.a + '\u00b0\u2013' + row.range.b + '\u00b0 posto', semifinali: [], finali: [] });
      gruppi.get(gruppoCorrente).semifinali.push(row);
    } else if (gruppoCorrente) {
      gruppi.get(gruppoCorrente).finali.push(row);
    }
  });
  return [...gruppi.values()];
}

function bracketCard(row, opts) {
  opts = opts || {};
  let campoCls, campoLbl;
  if (row.campo === 'ROSSO')                            { campoCls='campo-r'; campoLbl='Campo Rosso'; }
  else if (row.campo === 'BLU' || row.campo === 'BLUE') { campoCls='campo-b'; campoLbl='Campo Blu'; }
  else if (row.campo)                                   { campoCls='campo-g'; campoLbl='Campo Verde'; }
  const campoHtml = campoCls ? '<span class="campo-pill ' + campoCls + '">' + campoLbl + '</span>' : '<span></span>';
  const timeHtml = (row.data || row.orario) ? '<span class="bracket-time">' + [row.data, row.orario].filter(Boolean).join(' \u00b7 ') + '</span>' : '';
  const hasTeams = row.sq1 && row.sq2;
  const teamsHtml = hasTeams
    ? '<div class="bracket-team">' + row.sq1 + '</div><div class="bracket-vs">vs</div><div class="bracket-team">' + row.sq2 + '</div>'
    : '<span class="bracket-team tbd">' + (opts.placeholder || 'Da definire') + '</span>';
  return '<div class="bracket-card"><div class="bracket-card-head">' + campoHtml + timeHtml + '</div><div class="bracket-teams">' + teamsHtml + '</div></div>';
}

function bracketConnectorSVG() {
  return '<svg class="bracket-connector" viewBox="0 0 90 220" preserveAspectRatio="none">'
    + '<path d="M0 38 H30 V110 H60" fill="none" stroke="var(--accent-mid)" stroke-width="1.5"/>'
    + '<path d="M0 182 H30 V110 H60" fill="none" stroke="var(--accent-mid)" stroke-width="1.5"/>'
    + '</svg>';
}

function bracketFinalCard(row, label, placeholder) {
  let campoLbl = '';
  if (row && row.campo === 'ROSSO') campoLbl = 'rosso';
  else if (row && (row.campo === 'BLU' || row.campo === 'BLUE')) campoLbl = 'blu';
  else if (row && row.campo) campoLbl = 'verde';
  const timeBits = [];
  if (row && row.data) timeBits.push(row.data);
  if (campoLbl) timeBits.push(campoLbl);
  if (row && row.orario) timeBits.push(row.orario);
  const timeHtml = timeBits.length ? '<span class="bracket-time">' + timeBits.join(' \u00b7 ') + '</span>' : '';
  const hasTeams = row && row.sq1 && row.sq2;
  let bodyHtml;
  if (hasTeams) {
    bodyHtml = '<div class="bracket-team">' + row.sq1 + '</div><div class="bracket-vs">vs</div><div class="bracket-team">' + row.sq2 + '</div>';
  } else {
    bodyHtml = '<span class="bracket-final-placeholder">' + placeholder + '</span>';
  }
  return '<div class="bracket-final-card"><div class="bracket-final-head"><span class="bracket-final-label">' + label + '</span>' + timeHtml + '</div><div class="bracket-final-teams">' + bodyHtml + '</div></div>';
}

function renderBracketGroup(gruppo) {
  const sf = gruppo.semifinali;
  const fin = gruppo.finali;
  const a = gruppo.label.match(/^(\d+)/)[1];
  const top = fin[0];
  const bottom = fin[1];
  let html = '<div class="bracket-block">';
  html += '<div class="bracket-title">Fase finale</div>';
  html += '<div class="bracket-sub">' + gruppo.label + '</div>';
  html += '<div class="bracket-grid">';
  html += '<div class="bracket-col-sf">' + sf.map(r => bracketCard(r)).join('') + '</div>';
  html += '<div class="bracket-center">' + bracketConnectorSVG() + '</div>';
  html += bracketFinalCard(top, 'Finale ' + (top ? top.range.a + '\u00b0-' + top.range.b + '\u00b0' : ''), 'Vincenti semifinali');
  html += '</div></div>';
  if (bottom) {
    html += '<div class="bracket-block">';
    html += '<div class="bracket-sub minor">' + bottom.range.a + '\u00b0\u2013' + bottom.range.b + '\u00b0 posto</div>';
    html += '<div class="bracket-grid">';
    html += '<div class="bracket-col-sf"><div style="height:1px"></div></div>';
    html += '<div class="bracket-center"></div>';
    html += bracketFinalCard(bottom, 'Finale ' + bottom.range.a + '\u00b0-' + bottom.range.b + '\u00b0', 'Perdenti semifinali');
    html += '</div></div>';
  }
  return html;
}

function buildBracket() {
  const container = document.getElementById('bracket-container');
  if (!container) return;
  if (!bracketData || bracketData.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = bracketData.map(renderBracketGroup).join('<div style="border-top:1px solid var(--border);margin:2.4rem 0"></div>');
}

function openModal(p, cfg) {
  const hasResult = p.p1 !== '' && p.p2 !== '';

  document.getElementById('modal-girone-label').textContent = cfg.label + ' \u00b7 ' + gironataShort(p.giornata);
  document.getElementById('modal-sq1').textContent = p.sq1;
  document.getElementById('modal-sq2').textContent = p.sq2;
  const scoreEl = document.getElementById('modal-final-score');
  scoreEl.textContent = hasResult ? (p.p1 + ' \u2013 ' + p.p2) : 'vs';
  scoreEl.style.color = hasResult ? 'var(--accent-light)' : 'var(--muted)';

  if (p.risultato) {
    const sets = p.risultato.trim().split(/\s+/);
    document.getElementById('modal-matches').innerHTML = sets.map((s, i) =>
      '<div class="modal-match-row"><div><div class="modal-match-num">Set ' + (i+1) + '</div></div><div class="modal-match-result">' + s + '</div></div>'

function closeModal() {

// ── BUILD GIORNIMAP ───────────────────────────────────────────────────────────
function buildGiorniMap() {
  const allPartite = [];
  CONFIG.gironi.forEach(cfg => {
    const data = gironiData[cfg.name]; if (!data) return;
    data.partite.forEach(p => allPartite.push(Object.assign({}, p, { cfg })));
  });
  calGiorniMap = new Map();
  allPartite.forEach(p => {
    const info = parseData(p.data);
    const key  = info ? info.uniqueKey : '__nodate__';
    if (!calGiorniMap.has(key)) calGiorniMap.set(key, { info, gironiByName: new Map() });
    const giorno = calGiorniMap.get(key);
    if (!giorno.gironiByName.has(p.cfg.name)) giorno.gironiByName.set(p.cfg.name, { cfg: p.cfg, partite: [] });
    giorno.gironiByName.get(p.cfg.name).partite.push(p);
  });
  calSortedKeys = [...calGiorniMap.keys()].sort((a, b) => {
    if (a === '__nodate__') return 1; if (b === '__nodate__') return -1;
    return a.localeCompare(b);
  });
}

function renderDayBlock(key, tipo) {
  const giorno = calGiorniMap.get(key);
  const info   = giorno.info;
  const block  = document.createElement('div');
  block.className = 'day-block' + (tipo === 'passato' ? ' passato' : tipo === 'prossimo' ? ' prossimo' : '');
  block.dataset.key = key;

  const header = document.createElement('div');
  header.className = 'day-header';
  if (info) {
    const badge = tipo === 'prossimo' ? '<span class="prossimo-badge">Prossimo</span>' : '';
    header.innerHTML = '<div class="day-date-box"><div class="day-num">' + info.day + '</div><div class="day-month">' + info.month + '</div></div><div class="day-weekday">' + info.weekday + badge + '</div>';
  } else {
    header.innerHTML = '<div class="day-weekday" style="color:var(--muted)">Data da definire</div>';
  }
  block.appendChild(header);

  CONFIG.gironi.forEach(cfg => {
    const gruppo = giorno.gironiByName.get(cfg.name); if (!gruppo) return;
    const gGroup = document.createElement('div');
    gGroup.className = 'girone-group';
    gGroup.dataset.girone = cfg.name;

    const gHead = document.createElement('div');
    gHead.className = 'girone-group-header';
    gHead.style.cssText = 'background:' + cfg.cssVars['--g-dim'] + ';border:1px solid ' + cfg.cssVars['--g-mid'] + ';color:' + cfg.color + ';';
    gHead.innerHTML = '<div style="width:7px;height:7px;border-radius:50%;background:' + cfg.color + ';flex-shrink:0"></div>' + cfg.label + ' \u00b7 ' + gironataShort(gruppo.partite[0] && gruppo.partite[0].giornata);
    gGroup.appendChild(gHead);

    gruppo.partite.forEach(p => {
      let campoCls, dotStyle, campoLbl;
      if (p.campo === 'ROSSO')                          { campoCls='campo-r'; dotStyle='background:#e8408a'; campoLbl='Campo Rosso'; }
      else if (p.campo === 'BLU' || p.campo === 'BLUE'){ campoCls='campo-b'; dotStyle='background:#6f90e8'; campoLbl='Campo Blu'; }
      else                                              { campoCls='campo-g'; dotStyle='background:var(--accent)'; campoLbl='Campo Verde'; }

      const hasResult = p.p1 !== '' && p.p2 !== '';
      const row = document.createElement('div');
      row.className = 'match-row';
      row.dataset.sq1 = p.sq1.toLowerCase();
      row.dataset.sq2 = p.sq2.toLowerCase();
      row.innerHTML = '<div><span class="campo-pill ' + campoCls + '"><span class="campo-dot" style="' + dotStyle + '"></span>' + campoLbl + '</span>' + (p.orario ? '<div style="font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px;">' + p.orario + '</div>' : '') + '</div>'
        + '<div class="teams-row"><span class="team-name right">' + p.sq1 + '</span>'
        + (hasResult ? '<span class="score-chip">' + p.p1 + ' \u2013 ' + p.p2 + '</span>' : '<span class="vs-chip">vs</span>')
        + '<span class="team-name">' + p.sq2 + '</span></div>';

      if (hasResult) {
        const chip = row.querySelector('.score-chip');
        (function(pp, cc) {
          chip.addEventListener('click', function(e) { e.stopPropagation(); openModal(pp, cc); });
        })(p, cfg);
      }
      gGroup.appendChild(row);
    });
    block.appendChild(gGroup);
  });
  return block;
}

  buildGiorniMap();

  if (keyPassati.length > 0) {
    const bar = document.createElement('div');

function applyFilters() {
  const sq = (document.getElementById('f-squadra') ? document.getElementById('f-squadra').value : '').toLowerCase().trim();
  document.querySelectorAll('.day-block').forEach(function(block) {
    var blockVisible = false;
    block.querySelectorAll('.girone-group').forEach(function(grp) {
      var gName = grp.dataset.girone;
      var gironeOk = calFiltroGirone === 'tutti' || gName === calFiltroGirone;

  var hasVisible = Array.from(container.querySelectorAll('.day-block')).some(function(b) { return b.style.display !== 'none'; });

function classifyColor(bg) {
  if (!bg) return 'white';
  const r = Math.round((bg.red||0)*255), g = Math.round((bg.green||0)*255), b = Math.round((bg.blue||0)*255);
  if (r>230&&g>230&&b>230)       return 'white';
  if (r>200&&g>180&&b<100)       return 'yellow';
  if (g>150&&g>r+30&&g>b+30)    return 'green';
  if (r>200&&g>80&&g<180&&b<80) return 'orange';
  if (r>150&&r>g+50&&r>b+50)    return 'red';
  return 'white';
}
const levColor = { white:'#e8f0ea', yellow:'#f5c842', green:'#4fd988', orange:'#e8802a', red:'#d94f4f' };

function parseRose(rows) {
  if (!rows.length) return [];
  const headerRow = rows[0].values || [];
  const squadre = [], colIndices = [];
  headerRow.forEach((cell, i) => {
    const nome = ((cell.userEnteredValue && cell.userEnteredValue.stringValue) || cell.formattedValue || '').trim();
    if (nome) { squadre.push({ nome, capitano:'', capitanoLev:'white', giocatori:[] }); colIndices.push(i); }
  });
  for (let r = 1; r < rows.length; r++) {
    const cells = rows[r].values || [];
    colIndices.forEach((ci, si) => {
      const cell = cells[ci]; if (!cell) return;
      const raw = ((cell.userEnteredValue && cell.userEnteredValue.stringValue) || cell.formattedValue || '').trim(); if (!raw) return;
      const bg = cell.userEnteredFormat && cell.userEnteredFormat.backgroundColor;
      const level = classifyColor(bg);
      const isCap = KRegex.test(raw); KRegex.lastIndex = 0;
      const nome = raw.replace(/\s*\(\s*[Kk]\s*\)/g,'').trim(); if (!nome) return;
      if (isCap && !squadre[si].capitano) { squadre[si].capitano = nome; squadre[si].capitanoLev = level; }
      else squadre[si].giocatori.push({ nome, level });
    });
  }
  return squadre;
}

function buildSquadre(squadre) {
  const container = document.getElementById('squadre-container');
  if (!container) return;
  const grid = document.createElement('div');
  grid.className = 'squadre-grid';
  container.innerHTML = '';
  container.appendChild(grid);
  let tot = 0;
  const colori = CONFIG.squadreColori;
  squadre.forEach((s, idx) => {
    const c = colori[idx % colori.length];
    const totCard = (s.capitano ? 1 : 0) + s.giocatori.length;
    tot += totCard;
    const playersHTML = s.giocatori.map(function(pl) {
      const col = levColor[pl.level] || levColor.white;
      return '<div class="player-row"><div class="dot" style="background:' + c.t + ';opacity:0.5"></div><span class="player-name" style="color:' + col + ';">' + pl.nome + '</span></div>';
    }).join('');
    const capTextColor = levColor[s.capitanoLev] || levColor.white;
    const capHTML = s.capitano ? '<div class="squadra-cap" style="background:' + c.dim + ';"><span class="cap-icon">CAP</span><span class="cap-name" style="color:' + capTextColor + ';">' + s.capitano + '</span></div>' : '';
    const card = document.createElement('div');
    card.className = 'squadra-card';
    card.dataset.idx = idx;
    card.style.borderColor = c.h;
    card.innerHTML = '<div class="squadra-head" onclick="togglePlayers(' + idx + ')" style="background:' + c.b + ';border-bottom:1px solid ' + c.h + ';"><h3 style="color:' + c.t + ';">' + s.nome + '</h3><span class="squadra-badge" style="color:' + c.t + ';background:' + c.dim + ';">' + totCard + ' gioc.</span></div>' + capHTML + '<div class="squadra-players" id="players-' + idx + '">' + playersHTML + '</div><div class="squadra-toggle" onclick="togglePlayers(' + idx + ')" id="toggle-' + idx + '" style="border-top-color:' + c.h + ';color:' + c.t + ';opacity:0.6;">\u25bc Vedi tutte le giocatrici</div>';
    grid.appendChild(card);
  });
  document.getElementById('stat-squadre').textContent   = squadre.length;
  document.getElementById('stat-giocatori').textContent = tot + '+';
  setText('squadre-sub', squadre.length + ' squadre iscritte \u00b7 ' + CONFIG.gironi.map(g => g.label).join(', '));
}

function filterSquadre(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.squadra-card').forEach((card, i) => {
    const s = squadreData[i]; if (!s) return;
    const match = !q || s.nome.toLowerCase().includes(q) || s.capitano.toLowerCase().includes(q) || s.giocatori.some(p => p.nome.toLowerCase().includes(q));

  });
}

function togglePlayers(idx) {
  const el  = document.getElementById('players-' + idx);
  const tog = document.getElementById('toggle-' + idx);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  tog.textContent = isOpen ? '\u25bc Vedi tutte le giocatrici' : '\u25b2 Chiudi';
}

function setActive(el) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
}

document.querySelectorAll('.fade-in').forEach(el =>
  new IntersectionObserver(([e]) => { if (e.isIntersecting) el.classList.add('visible'); }, { threshold: 0.1 }).observe(el)
);

initFromConfig();
loadGironi();
loadSquadre();
setInterval(function() { loadGironi(); loadSquadre(); }, 5 * 60 * 1000);
</script>
</body>
</html>
